version: "3.7"
services:
  app:
    build:
      context: ../.
      dockerfile: ./Dockerfile
    env_file: .env
    healthcheck:
      test: curl -f localhost:8080/health
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      - db
  db:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

volumes:
  postgres_data:
